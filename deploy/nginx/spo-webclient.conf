# SPO-WebClient Nginx Reverse Proxy Configuration
#
# IMPORTANT: The Node.js app sets ALL security headers (CSP, HSTS, X-Frame-Options,
# X-Content-Type-Options, Referrer-Policy, Permissions-Policy, COOP).
# Do NOT add security headers in nginx — duplicates cause browser issues (especially CSP).
#
# Replace spo.yourdomain.com with your actual domain throughout this file.

# Rate limiting zone (first line of defense, in addition to app-level rate limiting)
limit_req_zone $binary_remote_addr zone=spo_general:10m rate=30r/s;

# ──────────────────────────────────────────────
# HTTP → HTTPS redirect
# ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name spo.yourdomain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────
# Main HTTPS server
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name spo.yourdomain.com;

    # ── TLS Certificates ──
    ssl_certificate     /etc/letsencrypt/live/spo.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spo.yourdomain.com/privkey.pem;

    # ── TLS Hardening (Mozilla Intermediate) ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ── OCSP Stapling ──
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── General settings ──
    limit_req zone=spo_general burst=60 nodelay;
    limit_req_status 429;
    client_max_body_size 1m;

    # ── Default proxy timeouts ──
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 300s; # Long for SSE startup-status stream

    # ──────────────────────────────────────────
    # WebSocket endpoint
    # ──────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client IP (app reads X-Forwarded-For when TRUST_PROXY=true)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket alive for long game sessions (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time communication
        proxy_buffering off;
    }

    # ──────────────────────────────────────────
    # SSE endpoint (startup progress stream)
    # ──────────────────────────────────────────
    location /api/startup-status {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE requires no buffering — otherwise events are held by nginx
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # ──────────────────────────────────────────
    # All other requests (static files, API, image proxy)
    # ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Enable buffering for static file performance
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }
}
