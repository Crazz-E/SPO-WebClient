appId: com.starpeaceonline.client
productName: Starpeace Online
copyright: Copyright © 2025 Starpeace Online

# Files to include in the packaged app
files:
  - dist/**/*
  - public/**/*
  - cache/**/*
  - node_modules/**/*
  - package.json

# Output directory for installers
directories:
  output: release
  buildResources: electron/assets

# Auto-update via GitHub Releases
publish:
  provider: github
  owner: Crazysky
  repo: SPO-WebClient

# Windows — NSIS installer (.exe)
win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Starpeace Online

# macOS — DMG
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: electron/assets/icon.icns
  category: public.app-category.games

dmg:
  title: Starpeace Online

# Linux — AppImage
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: electron/assets/icon.png
  category: Game
