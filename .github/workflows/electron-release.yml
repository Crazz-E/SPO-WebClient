name: Electron Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package-lock.json') }}

      - name: Cache electron node_modules
        uses: actions/cache@v4
        with:
          path: electron/node_modules
          key: electron-modules-${{ hashFiles('electron/package-lock.json') }}

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('electron/package-lock.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install root dependencies
        run: npm ci

      - name: Build server + client
        run: npm run build

      - name: Install electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build and publish installer
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true'
        working-directory: electron
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer (no publish)
        if: "!(startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true')"
        working-directory: electron
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            electron/release/*.exe
            electron/release/*.exe.blockmap
            electron/release/*.yml
          if-no-files-found: error
