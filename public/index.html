<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starpeace Online</title>

    <!-- Google Fonts - Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Application styles -->
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="app.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 50%, #020617 100%);
            overscroll-behavior: none;    /* prevent iOS rubber-band eating first touchmove */
            touch-action: none;           /* delegate all touch handling to canvas JS */
        }

        /* Game panel: canvas container, filled by MapNavigationUI */
        #game-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: transparent;
            touch-action: none;           /* canvas container must not scroll */
        }

    </style>
</head>
<body>

    <!-- Game panel: canvas container (populated by MapNavigationUI) -->
    <div id="game-panel"></div>

    <!-- React mount point -->
    <div id="react-root"></div>

    <!-- Application -->
    <script type="module" src="app.js"></script>

</body>
</html>
